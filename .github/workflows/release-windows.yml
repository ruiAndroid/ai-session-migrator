name: Release Windows executable

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test --lib

      - name: Build desktop executable
        run: npm run desktop:build

      - name: Rename executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item `
            -Path apps/desktop/src-tauri/target/release/ai-session-migrator.exe `
            -Destination artifacts/AI-Session-Migrator-Windows-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Session-Migrator-Windows-x64
          path: artifacts/AI-Session-Migrator-Windows-x64.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/AI-Session-Migrator-Windows-x64.exe
          body_path: docs/release-notes-v0.1.0.md
