name: Release Windows installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test --features desktop

      - name: Build desktop installer
        run: npm run desktop:bundle

      - name: Collect installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $installer = Get-ChildItem `
            -Path apps/desktop/src-tauri/target/release/bundle/nsis `
            -Filter "*_x64-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "No Windows NSIS installer was produced."
          }

          Copy-Item `
            -LiteralPath $installer.FullName `
            -Destination artifacts/AI-Session-Migrator-Windows-x64-setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Session-Migrator-Windows-x64-setup
          path: artifacts/AI-Session-Migrator-Windows-x64-setup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/AI-Session-Migrator-Windows-x64-setup.exe
          body_path: docs/release-notes-${{ github.ref_name }}.md
